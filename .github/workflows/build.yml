name: Build DMG
on: [push]
jobs:
  build:
    runs-on: macos-14  # Specifically use macOS 14 (Sonoma)
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Compile and Bundle App
        run: |
          # 1. Create the App Bundle structure
          mkdir -p MiniDisplay.app/Contents/MacOS
          mkdir -p MiniDisplay.app/Contents/Resources
          
          # 2. Move Info.plist to the bundle
          cp Info.plist MiniDisplay.app/Contents/Info.plist
          
          # 3. Get the SDK path clearly
          SDK_PATH=$(xcrun --show-sdk-path --sdk macos)
          
          # 4. Compile the Swift code
          # We build for both Intel and Apple Silicon (Universal Binary)
          swiftc -parse-as-library App.swift \
            -o MiniDisplay.app/Contents/MacOS/MiniDisplay \
            -sdk "$SDK_PATH" \
            -target arm64-apple-macosx11.0
            
      - name: Create DMG
        run: |
          mkdir dist
          cp -r MiniDisplay.app dist/
          hdiutil create -volname "MiniDisplay" -srcfolder dist -ov -format UDZO MiniDisplay.app.dmg
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiniDisplay-Installer
          path: MiniDisplay.app.dmg