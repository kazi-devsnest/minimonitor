name: Build DMG
on: [push]
jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Compile and Bundle App
        run: |
          mkdir -p MiniDisplay.app/Contents/MacOS
          cp Info.plist MiniDisplay.app/Contents/Info.plist

          SDK_PATH=$(xcrun --sdk macosx --show-sdk-path)

          # Compile for Apple Silicon (M1/M2/M3/M4)
          swiftc -parse-as-library App.swift \
            -o MiniDisplay_arm64 \
            -sdk "$SDK_PATH" \
            -target arm64-apple-macosx11.0 \
            -framework SwiftUI \
            -framework AppKit \
            -framework IOKit

          # Compile for Intel
          swiftc -parse-as-library App.swift \
            -o MiniDisplay_x86 \
            -sdk "$SDK_PATH" \
            -target x86_64-apple-macosx11.0 \
            -framework SwiftUI \
            -framework AppKit \
            -framework IOKit

          # Merge into Universal Binary
          lipo -create MiniDisplay_arm64 MiniDisplay_x86 \
            -output MiniDisplay.app/Contents/MacOS/MiniDisplay

      - name: Create DMG
        run: |
          mkdir dist
          cp -r MiniDisplay.app dist/
          hdiutil create -volname "MiniDisplay" -srcfolder dist -ov -format UDZO MiniDisplay.app.dmg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiniDisplay-Installer
          path: MiniDisplay.app.dmg